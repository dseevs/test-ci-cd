server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /acetic/;
  }

  # Strip /acetic/ prefix then serve from root (build/ has _next/ at top level)
  location /acetic/ {
    rewrite ^/acetic/?(.*)$ /$1 break;
    try_files $uri $uri.html $uri/ =404;
  }
}
